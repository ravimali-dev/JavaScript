<!DOCTYPE html>
<html>
<head>
  <title>Delegation Demo</title>
</head>
<body>

<ul id="list">
  <li><span>Apple</span></li>
  <li>Mango</li>
  <li>Banana</li>
</ul>

<script>
document.getElementById("list").addEventListener("click", (e) => {
    console.log("List")
});
document.querySelectorAll("li").forEach((li) => {
  li.addEventListener("click", () => {
    console.log("list item");
  })
})
</script>

</body>
</html>
