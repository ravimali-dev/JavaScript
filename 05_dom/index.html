<!DOCTYPE html>
<html>
<head>
  <title>Delegation Demo</title>
</head>
<body>

<ul id="list">
  <li><span>Apple</span></li>
  <li>Mango</li>
  <li>Banana</li>
</ul>

<script>
document.getElementById("list").addEventListener("click", (e) => {
    console.log("Listener is on UL");
  console.log("Clicked element:", e.target);
});
</script>

</body>
</html>
